<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#251d14"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6a157" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e6a157" stop-opacity="0"/>
    </radialGradient>
    <filter id="cityglow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#e6a157" stroke-width="0.5">
    <line x1="0" y1="104" x2="800" y2="104"/>
    <line x1="0" y1="208" x2="800" y2="208"/>
    <line x1="0" y1="312" x2="800" y2="312"/>
    <line x1="0" y1="416" x2="800" y2="416"/>
    <line x1="160" y1="0" x2="160" y2="520"/>
    <line x1="320" y1="0" x2="320" y2="520"/>
    <line x1="480" y1="0" x2="480" y2="520"/>
    <line x1="640" y1="0" x2="640" y2="520"/>
  </g>

  <!-- Abstract China eastern coast silhouette -->
  <path d="M 260 60 L 275 75 L 295 80 L 310 95 L 330 100 L 345 88 L 370 90 L 390 82 L 415 88 L 435 75 L 460 80 L 480 70 L 510 78 L 535 65 L 560 72 L 580 60 L 610 68 L 625 82 L 640 90 L 648 108 L 660 120 L 668 138 L 672 158 L 668 178 L 672 196 L 665 215 L 670 232 L 675 248 L 665 262 L 670 278 L 660 294 L 650 308 L 638 320 L 625 335 L 610 345 L 598 360 L 588 375 L 578 390 L 565 402 L 548 412 L 532 420 L 515 428 L 498 438 L 480 448 L 460 454 L 440 460 L 420 465 L 400 470 L 380 472 L 360 468 L 345 460 L 335 448 L 328 435 L 320 422 L 318 410 L 322 398 L 315 385 L 308 372 L 298 360 L 285 352 L 272 345 L 258 340 L 248 330 L 242 318 L 245 305 L 252 292 L 248 278 L 240 265 L 235 250 L 238 235 L 245 220 L 248 205 L 242 190 L 238 175 L 240 160 L 248 145 L 252 130 L 255 115 L 258 100 L 260 85 Z"
    stroke="#e6a157" stroke-width="0.8" stroke-opacity="0.18" fill="#e6a157" fill-opacity="0.03"/>

  <!-- Western China outline suggestion -->
  <path d="M 260 60 L 240 58 L 215 62 L 190 58 L 165 65 L 145 75 L 128 90 L 118 108 L 112 128 L 110 150 L 115 170 L 120 190 L 118 210 L 112 230 L 108 252 L 112 272 L 118 290 L 125 308 L 128 325 L 132 342 L 140 358 L 150 370 L 162 382 L 175 392 L 188 402 L 202 410 L 218 418 L 235 425 L 248 430 L 258 440 L 260 452 L 262 465"
    stroke="#e6a157" stroke-width="0.6" stroke-opacity="0.12" fill="none"/>

  <!-- Connection lines between cities -->
  <g filter="url(#lineglow)" opacity="0.35" stroke="#e6a157" stroke-width="0.8">
    <!-- North cluster: Beijing → Wuhan → Nanjing -->
    <line x1="554" y1="178" x2="524" y2="306"/>
    <line x1="524" y1="306" x2="582" y2="284"/>
    <line x1="554" y1="178" x2="582" y2="284"/>
    <!-- Nanjing → Nanchang → Wuhan -->
    <line x1="582" y1="284" x2="548" y2="328"/>
    <line x1="548" y1="328" x2="524" y2="306"/>
    <!-- Central: Chengdu / Mianyang cluster -->
    <line x1="390" y1="292" x2="400" y2="308"/>
    <!-- Chengdu → Guiyang → Changsha -->
    <line x1="390" y1="292" x2="422" y2="360"/>
    <line x1="422" y1="360" x2="505" y2="340"/>
    <line x1="505" y1="340" x2="524" y2="306"/>
    <!-- Changsha → Nanchang -->
    <line x1="505" y1="340" x2="548" y2="328"/>
    <!-- South: Nanning → Guiyang → Kunming -->
    <line x1="374" y1="420" x2="422" y2="360"/>
    <line x1="422" y1="360" x2="338" y2="388"/>
    <!-- Pearl River Delta cluster -->
    <line x1="510" y1="432" x2="518" y2="448"/>
    <line x1="518" y1="448" x2="524" y2="440"/>
    <line x1="510" y1="432" x2="524" y2="440"/>
    <!-- Guangzhou → Changsha -->
    <line x1="510" y1="432" x2="505" y2="340"/>
    <!-- Nanning → Guangzhou -->
    <line x1="374" y1="420" x2="510" y2="432"/>
  </g>

  <!-- City dots with glow -->
  <!-- 北京 Beijing -->
  <g filter="url(#cityglow)">
    <circle cx="554" cy="178" r="7" fill="#e6a157" opacity="0.25"/>
    <circle cx="554" cy="178" r="4" fill="#e6a157" opacity="0.85"/>
    <circle cx="554" cy="178" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="564" y="175" fill="#e6a157" font-size="11" font-family="serif" opacity="0.9">北京</text>

  <!-- 南京 Nanjing -->
  <g filter="url(#cityglow)">
    <circle cx="582" cy="284" r="6" fill="#e6a157" opacity="0.22"/>
    <circle cx="582" cy="284" r="3.5" fill="#e6a157" opacity="0.8"/>
    <circle cx="582" cy="284" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="590" y="281" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">南京</text>

  <!-- 武汉 Wuhan -->
  <g filter="url(#cityglow)">
    <circle cx="524" cy="306" r="6" fill="#e6a157" opacity="0.22"/>
    <circle cx="524" cy="306" r="3.5" fill="#e6a157" opacity="0.8"/>
    <circle cx="524" cy="306" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="532" y="303" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">武汉</text>

  <!-- 南昌 Nanchang -->
  <g filter="url(#cityglow)">
    <circle cx="548" cy="328" r="5.5" fill="#e6a157" opacity="0.20"/>
    <circle cx="548" cy="328" r="3" fill="#e6a157" opacity="0.78"/>
    <circle cx="548" cy="328" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="555" y="326" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">南昌</text>

  <!-- 长沙 Changsha -->
  <g filter="url(#cityglow)">
    <circle cx="505" cy="340" r="5.5" fill="#e6a157" opacity="0.20"/>
    <circle cx="505" cy="340" r="3" fill="#e6a157" opacity="0.78"/>
    <circle cx="505" cy="340" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="510" y="355" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">长沙</text>

  <!-- 成都 Chengdu -->
  <g filter="url(#cityglow)">
    <circle cx="390" cy="292" r="6" fill="#e6a157" opacity="0.22"/>
    <circle cx="390" cy="292" r="3.5" fill="#e6a157" opacity="0.8"/>
    <circle cx="390" cy="292" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="396" y="289" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">成都</text>

  <!-- 绵阳 Mianyang -->
  <g filter="url(#cityglow)">
    <circle cx="400" cy="272" r="4.5" fill="#e6a157" opacity="0.18"/>
    <circle cx="400" cy="272" r="2.5" fill="#e6a157" opacity="0.72"/>
    <circle cx="400" cy="272" r="1" fill="#fff3e0"/>
  </g>
  <text x="407" y="270" fill="#e6a157" font-size="9" font-family="serif" opacity="0.8">绵阳</text>

  <!-- 贵阳 Guiyang -->
  <g filter="url(#cityglow)">
    <circle cx="422" cy="360" r="5.5" fill="#e6a157" opacity="0.20"/>
    <circle cx="422" cy="360" r="3" fill="#e6a157" opacity="0.78"/>
    <circle cx="422" cy="360" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="428" y="358" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">贵阳</text>

  <!-- 昆明 Kunming -->
  <g filter="url(#cityglow)">
    <circle cx="338" cy="388" r="5.5" fill="#e6a157" opacity="0.20"/>
    <circle cx="338" cy="388" r="3" fill="#e6a157" opacity="0.78"/>
    <circle cx="338" cy="388" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="318" y="400" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">昆明</text>

  <!-- 南宁 Nanning -->
  <g filter="url(#cityglow)">
    <circle cx="374" cy="420" r="5.5" fill="#e6a157" opacity="0.20"/>
    <circle cx="374" cy="420" r="3" fill="#e6a157" opacity="0.78"/>
    <circle cx="374" cy="420" r="1.5" fill="#fff3e0"/>
  </g>
  <text x="352" y="435" fill="#e6a157" font-size="10" font-family="serif" opacity="0.85">南宁</text>

  <!-- Pearl River Delta: 广州/佛山/深圳 (clustered) -->
  <g filter="url(#cityglow)">
    <circle cx="510" cy="432" r="8" fill="#e6a157" opacity="0.30"/>
    <circle cx="510" cy="432" r="5" fill="#e6a157" opacity="0.88"/>
    <circle cx="510" cy="432" r="2" fill="#fff3e0"/>
  </g>
  <text x="516" y="427" fill="#e6a157" font-size="10" font-family="serif" opacity="0.9">广州</text>
  <!-- Foshan tiny dot -->
  <circle cx="502" cy="442" r="2" fill="#e6a157" opacity="0.65"/>
  <!-- Shenzhen tiny dot -->
  <circle cx="520" cy="448" r="2" fill="#e6a157" opacity="0.65"/>
  <text x="524" y="460" fill="#e6a157" font-size="9" font-family="serif" opacity="0.75">深圳</text>

  <!-- Count badge -->
  <rect x="28" y="28" width="140" height="44" rx="6" fill="#1a1410" fill-opacity="0.9" stroke="#e6a157" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="38" y="46" fill="#e6a157" font-size="22" font-weight="bold" font-family="serif" opacity="0.95">15</text>
  <text x="66" y="43" fill="#f5f0e8" font-size="10" font-family="sans-serif" opacity="0.75">城市</text>
  <text x="66" y="57" fill="#e6a157" font-size="9" font-family="sans-serif" opacity="0.65">CITIES TOUR</text>

  <!-- Title -->
  <text x="400" y="496" text-anchor="middle" fill="#e6a157" font-size="12" font-family="serif" letter-spacing="4" opacity="0.55">全 国 巡 演 · 标 准 化 复 制</text>

  <!-- Ping animation rings (static version — CSS can't animate SVG in img tags) -->
  <circle cx="554" cy="178" r="14" stroke="#e6a157" stroke-width="0.6" fill="none" opacity="0.18"/>
  <circle cx="510" cy="432" r="18" stroke="#e6a157" stroke-width="0.6" fill="none" opacity="0.14"/>
</svg>
